services:
  lightpanda:
    image: lightpanda/browser:nightly
    # The image needs the binary name in the command (per Lightpanda docs):
    command: lightpanda serve --host 0.0.0.0 --port 9222
    expose:
      - "9222"
    restart: unless-stopped

  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - CDP_URL=ws://lightpanda:9222
      - PORT=3000
    depends_on:
      - lightpanda
    restart: unless-stopped
